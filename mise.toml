[tools]
uv = "latest"

[settings]
experimental = true
python.uv_venv_auto = true
idiomatic_version_file_enable_tools = ["python"]

[env]
_.file = '.env'
BOT_ENV = "development"
BOT_CONFIG = "./settings.toml"

[tasks.install]
description = "Install dependencies and hooks"
run = ["uv sync --all-groups", "uv run prek install"]

[tasks.format]
description = "Format the code"
run = ["uv run ruff format"]

[tasks.lint]
description = "Lint the code"
run = ["uv run ruff check"]

[tasks.type]
description = "Run type checks"
run = ["uv run ty check"]

[tasks.check]
description = "Run all checks"
depends = ["format --check", "lint", "type"]

[tasks."check:fix"]
description = "Fix all issues"
depends = ["format", "lint --fix", "type --fix"]

[tasks.dev]
description = "Start the bot"
depends = ["type"]
run = "uv run python -OO -m bot"

[tasks.prek]
description = "Run prek hooks"
run = ["uv run prek run --all-files"]

[tasks."prek:update"]
description = "Update prek hooks"
run = ["uv run prek auto-update"]
